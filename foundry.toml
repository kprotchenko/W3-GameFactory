# foundry.toml
[profile.default]
src  = "src"
out  = "out"
libs = ["lib"]                      # drop node_modules if you won't use it
remappings = [
  "@openzeppelin/=lib/openzeppelin-contracts/",
  "forge-std/=lib/forge-std/src/",
]


[rpc_endpoints]
anvil   = "http://127.0.0.1:8545"
sepolia = "${SEPOLIA_RPC_URL}"

[etherscan]
sepolia = { key = "${ETHERSCAN_API_KEY}" }